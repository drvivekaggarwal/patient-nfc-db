<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Record</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Patient Record</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
  <section class="card" id="patientCard">
    <p>Loading patient data...</p>
  </section>
</main>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function getPatientId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  async function loadPatient() {
    const id = getPatientId();

    if (!id) {
      document.getElementById("patientCard").innerHTML = "<p>No patient ID provided</p>";
      return;
    }

    const { data, error } = await client
      .from("patients")
      .select("*")
      .eq("patient_id", id)
      .single();

    if (error || !data) {
      document.getElementById("patientCard").innerHTML = "<p>Patient not found</p>";
      return;
    }

    document.getElementById("patientCard").innerHTML = `
      <h2>${data.name}</h2>
      <p><b>Patient ID:</b> ${data.patient_id}</p>
      <p><b>Age:</b> ${data.age}</p>
      <p><b>Gender:</b> ${data.gender}</p>
      <p><b>Address:</b> ${data.address}</p>
      <p><b>Chief Complaint:</b> ${data.chief_complaint}</p>
      <p><b>Radiographs:</b> ${data.radiographs}</p>
      <p><b>Diagnosis:</b> ${data.diagnosis}</p>
      <p><b>Treatment Planned:</b> ${data.treatment_planned}</p>
      <p><b>Treatment Done:</b> ${data.treatment_done}</p>
      <p><b>Notes:</b> ${data.notes}</p>
    `;
  }

  loadPatient();
</script>
</body>
</html>
